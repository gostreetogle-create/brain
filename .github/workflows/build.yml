name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Brain.Desktop/Brain.Desktop.csproj

    - name: Build EXE
      run: dotnet publish Brain.Desktop/Brain.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=embedded -o publish

    - name: Install Inno Setup
      shell: powershell
      run: |
        $url = "https://jrsoftware.org/download.php/is.exe"
        $out = "$env:TEMP\inno_setup.exe"
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri $url -OutFile $out
        Start-Process -Wait -FilePath $out -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=$env:ProgramFiles\Inno Setup 6"

    - name: Build Installer
      shell: powershell
      run: |
        & "C:\Program Files\Inno Setup 6\iscc.exe" "Brain.Desktop\installer.iss"

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: BRAIN_Setup
        path: Brain.Desktop/installer/BRAIN_Setup_*.exe

    - name: Delete old release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: powershell
      run: |
        gh release delete latest --yes 2>$null || $true
        git push --delete origin refs/tags/latest 2>$null || $true

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: powershell
      run: |
        $setup = Get-ChildItem "Brain.Desktop/installer/BRAIN_Setup_*.exe" | Select-Object -First 1
        gh release create latest $setup.FullName --title "Latest" --notes "Автоматическая сборка от $(Get-Date -Format 'dd.MM.yyyy HH:mm')" --target ${{ github.sha }}
