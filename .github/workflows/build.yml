name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Brain.Desktop/Brain.Desktop.csproj

    - name: Build EXE
      run: dotnet publish Brain.Desktop/Brain.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=embedded -o Brain.Desktop/publish

    - name: Install Inno Setup
      shell: powershell
      run: |
        choco install innosetup --confirm --no-progress 2>&1 | Out-Null
        $iscc = @(
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe",
          "C:\Program Files\Inno Setup 6\iscc.exe",
          "${env:ProgramFiles}\Inno Setup 6\iscc.exe",
          "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        echo "ISCC_PATH=$iscc" >> $env:GITHUB_ENV

    - name: Build Installer
      shell: powershell
      run: |
        & "$env:ISCC_PATH" "Brain.Desktop\installer.iss"

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: BRAIN_Setup
        path: Brain.Desktop/installer/BRAIN_Setup_*.exe

    - name: Delete old release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: powershell
      run: |
        gh release delete latest --yes 2>$null; if (-not $?) { "ignore" }
        git push --delete origin refs/tags/latest 2>$null; if (-not $?) { "ignore" }

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: powershell
      run: |
        $setup = Get-ChildItem "Brain.Desktop\installer\BRAIN_Setup_*.exe" | Select-Object -First 1
        gh release create latest $setup.FullName --title "Latest" --notes "Автоматическая сборка от $(Get-Date -Format 'dd.MM.yyyy HH:mm')" --target ${{ github.sha }}
