name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Brain.Desktop/Brain.Desktop.csproj

    - name: Build
      run: dotnet publish Brain.Desktop/Brain.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=embedded -o publish

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: BRAIN
        path: publish/BRAIN.exe

    - name: Delete old release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete latest --yes 2>$null || true
        git push --delete origin refs/tags/latest 2>$null || true

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create latest publish/BRAIN.exe --title "Latest" --notes "Автоматическая сборка от $(Get-Date -Format 'dd.MM.yyyy HH:mm')" --target ${{ github.sha }}
